name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "main.py"
      - "validate_courses.py"
      - "subprograms/**"
      - "assets/**"
      - "fonts/**"
      - ".github/workflows/build-desktop.yml"

jobs:
  build-windows:
    name: Build Windows exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyxel pygame "websockets<14" pyinstaller

      - name: Build exe
        shell: cmd
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name HighwayRacer ^
            --hidden-import websockets ^
            --collect-all websockets ^
            --add-data "subprograms;subprograms" ^
            --add-data "assets;assets" ^
            --add-data "fonts;fonts" ^
            main.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: HighwayRacer-windows
          path: dist/HighwayRacer.exe

  build-macos:
    name: Build macOS app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyxel pygame "websockets<14" pyinstaller

      - name: Build app
        run: |
          pyinstaller --noconfirm --clean --windowed --name HighwayRacer \
            --hidden-import websockets \
            --collect-all websockets \
            --add-data "subprograms:subprograms" \
            --add-data "assets:assets" \
            --add-data "fonts:fonts" \
            main.py

      - name: Zip app bundle
        run: |
          cd dist
          ditto -c -k --keepParent HighwayRacer.app HighwayRacer-mac.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: HighwayRacer-mac
          path: dist/HighwayRacer-mac.zip
